<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arkos — Fila de Produção</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f4f3f0;font-family:system-ui,-apple-system,sans-serif;color:#1a1816}
    .header{background:#fff;border-bottom:1px solid #e0ddd8;padding:14px 20px}
    .header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .header-title{font-size:15px;font-weight:700}
    .header-sub{font-size:11px;color:#8a8580;margin-top:2px}
    .btn-refresh{padding:7px 14px;background:#f4f3f0;border:1px solid #e0ddd8;border-radius:4px;cursor:pointer;font-size:12px;color:#5a5550}
    .filtros{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .btn-filtro{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:inherit;border:1.5px solid #e0ddd8;background:#f8f7f5;color:#6a6560;display:flex;align-items:center;gap:6px}
    .btn-filtro .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
    .btn-filtro.ativo-recebido{background:#fffbf0;border-color:#f5dcb0;color:#b06010}
    .btn-filtro.ativo-producao{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .btn-filtro.ativo-enviado{background:#f0fdf4;border-color:#bbf7d0;color:#15803d}
    .btn-filtro.ativo-todos{background:#f1f5f9;border-color:#94a3b8;color:#334155}
    .busca-bar{background:#fff;border-bottom:1px solid #e0ddd8;padding:10px 20px}
    .busca-bar input{width:100%;max-width:500px;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:4px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;color:#1a1816}
    .content{padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
    .card{background:#fff;border-radius:6px;border:1px solid #e0ddd8;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.05);border-top:3px solid #e0ddd8}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .tags{display:flex;gap:6px;flex-wrap:wrap}
    .tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;letter-spacing:.3px}
    .tag-recebido{background:#fffbf0;color:#b06010;border:1px solid #f5dcb0}
    .tag-producao{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .tag-enviado{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
    .tag-tipo{background:#f4f3f0;color:#6a6560;border:1px solid #e0ddd8}
    .card-data{font-size:11px;color:#8a8580}
    .card-solicitante{font-size:13px;font-weight:700;color:#c53030;margin-bottom:4px}
    .card-material{font-size:12px;color:#3a3835;line-height:1.5;white-space:pre-line;margin-bottom:8px}
    .card-cliente{background:#f8f7f5;border-radius:4px;padding:8px 10px;font-size:11px;display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
    .card-rastreio{margin-top:6px;font-size:11px;color:#15803d;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:4px;padding:5px 10px}
    .card-actions{display:flex;gap:8px;margin-top:12px}
    .btn-producao{flex:1;padding:8px 12px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
    .btn-enviado{flex:1;padding:8px 12px;background:#c53030;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
    .btn-voltar{padding:8px 12px;background:#f4f3f0;color:#5a5550;border:1px solid #e0ddd8;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit}
    .card-enviado-info{margin-top:10px;font-size:11px;color:#15803d}
    .empty{text-align:center;padding:60px 0;color:#8a8580;font-size:13px}
    .loading{text-align:center;padding:60px 0;color:#8a8580;font-size:13px}
    .erro{background:#fff5f5;border:1px solid #fcc;border-radius:4px;padding:10px 14px;font-size:12px;color:#c53030;margin-bottom:16px}
    /* MODAL */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
    .modal{background:#fff;border-radius:8px;padding:24px;width:90%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
    .modal h3{font-size:15px;font-weight:700;margin-bottom:4px}
    .modal-sub{font-size:12px;color:#8a8580;margin-bottom:10px}
    .modal-material{font-size:12px;color:#5a5550;line-height:1.5;white-space:pre-line;margin-bottom:16px;max-height:80px;overflow-y:auto}
    .modal label{font-size:11px;font-weight:600;color:#5a5550;display:block;margin-bottom:5px}
    .modal input{width:100%;background:#f8f7f5;border:1px solid #d8d5d0;border-radius:4px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:16px}
    .modal-actions{display:flex;gap:8px}
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Fila de Produção — Amostras</div>
      <div class="header-sub">Arkos Brasil · Time de Amostras</div>
    </div>
    <button class="btn-refresh" onclick="carregar()">↻ Atualizar</button>
  </div>
  <div class="filtros">
    <button class="btn-filtro ativo-recebido" id="f-recebido" onclick="setFiltro('recebido')">
      <span class="dot" style="background:#f59e0b"></span> Recebido <strong id="c-recebido">0</strong>
    </button>
    <button class="btn-filtro" id="f-producao" onclick="setFiltro('producao')">
      <span class="dot" style="background:#3b82f6"></span> Em Produção <strong id="c-producao">0</strong>
    </button>
    <button class="btn-filtro" id="f-enviado" onclick="setFiltro('enviado')">
      <span class="dot" style="background:#22c55e"></span> Enviado <strong id="c-enviado">0</strong>
    </button>
    <button class="btn-filtro" id="f-todos" onclick="setFiltro('todos')">
      Todos <strong id="c-todos">0</strong>
    </button>
  </div>
</div>

<div class="busca-bar">
  <input type="text" id="busca" placeholder="Buscar por solicitante, cliente, empresa ou material..." oninput="renderCards()"/>
</div>

<div class="content">
  <div id="erro-box" class="erro" style="display:none"></div>
  <div id="loading" class="loading">Carregando pedidos...</div>
  <div id="grid" class="grid" style="display:none"></div>
  <div id="empty" class="empty" style="display:none">Nenhum pedido encontrado.</div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" style="display:none" onclick="fecharModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-titulo"></h3>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-material" id="modal-material"></div>
    <div id="modal-rastreio-field" style="display:none">
      <label id="modal-rastreio-label">Código de rastreio</label>
      <input type="text" id="modal-rastreio" placeholder="Ex: AB962846400BR"/>
    </div>
    <div class="modal-actions">
      <button class="btn-enviado" id="modal-confirmar" onclick="confirmarUpdate()" style="flex:1">Confirmar</button>
      <button class="btn-voltar" onclick="fecharModal()" style="flex:1">Cancelar</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwfENYrCbmgdBzI5qgn2sy0llromxbaXd5u14kxT9HkRXtIMqBg7xGqqbbgw9C9uiKC/exec";
let pedidos = [];
let filtro = "recebido";
let modalPedido = null;
let modalNovoStatus = null;

function getStatus(p) {
  if (p.finalizado) return "enviado";
  if (p.emProducao) return "producao";
  return "recebido";
}

async function carregar() {
  document.getElementById("loading").style.display = "block";
  document.getElementById("grid").style.display = "none";
  document.getElementById("empty").style.display = "none";
  document.getElementById("erro-box").style.display = "none";
  try {
    const r = await fetch(SCRIPT_URL + "?action=fila");
    const d = await r.json();
    if (d.success) {
      pedidos = d.pedidos.reverse();
      atualizarContadores();
      renderCards();
    } else {
      mostrarErro("Erro: " + d.error);
    }
  } catch(e) {
    mostrarErro("Não foi possível conectar. Verifique a URL do Apps Script.");
  }
  document.getElementById("loading").style.display = "none";
}

function mostrarErro(msg) {
  const el = document.getElementById("erro-box");
  el.textContent = msg;
  el.style.display = "block";
}

function atualizarContadores() {
  const counts = {recebido:0, producao:0, enviado:0};
  pedidos.forEach(p => counts[getStatus(p)]++);
  document.getElementById("c-recebido").textContent = counts.recebido;
  document.getElementById("c-producao").textContent = counts.producao;
  document.getElementById("c-enviado").textContent = counts.enviado;
  document.getElementById("c-todos").textContent = pedidos.length;
}

function setFiltro(f) {
  filtro = f;
  ["recebido","producao","enviado","todos"].forEach(id => {
    document.getElementById("f-"+id).className = "btn-filtro";
  });
  document.getElementById("f-"+f).classList.add("ativo-"+(f==="todos"?"todos":f));
  renderCards();
}

function renderCards() {
  const busca = document.getElementById("busca").value.toLowerCase();
  const lista = pedidos.filter(p => {
    const s = getStatus(p);
    const matchFiltro = filtro === "todos" || s === filtro;
    const matchBusca = !busca || [p.comercial,p.cliente,p.empresa,p.material].join(" ").toLowerCase().includes(busca);
    return matchFiltro && matchBusca;
  });

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  if (lista.length === 0) {
    grid.style.display = "none";
    empty.style.display = "block";
    empty.textContent = busca ? "Nenhum pedido encontrado para essa busca." : "Nenhum pedido neste status.";
    return;
  }

  grid.style.display = "grid";
  empty.style.display = "none";

  const tipoIcon = {Motoboy:"🛵",Correios:"📦",Representantes:"🤝"};

  grid.innerHTML = lista.map(p => {
    const status = getStatus(p);
    const tagClass = "tag tag-"+status;
    const statusLabel = {recebido:"Recebido",producao:"Em Produção",enviado:"Enviado"}[status];
    const dotColor = {recebido:"#f59e0b",producao:"#3b82f6",enviado:"#22c55e"}[status];

    let acoes = "";
    if (status === "recebido") {
      acoes = `<div class="card-actions"><button class="btn-producao" onclick='abrirModal(event,"${p.id}","producao")'>Iniciar produção →</button></div>`;
    } else if (status === "producao") {
      acoes = `<div class="card-actions"><button class="btn-voltar" onclick='abrirModal(event,"${p.id}","recebido")'>← Voltar</button><button class="btn-enviado" onclick='abrirModal(event,"${p.id}","enviado")'>Marcar como enviado ✓</button></div>`;
    }
    const enviadoInfo = status === "enviado" && p.dataEnvio ? `<div class="card-enviado-info">✓ Enviado em ${p.dataEnvio}</div>` : "";
    const rastreioBox = p.rastreio ? `<div class="card-rastreio">🚚 ${p.rastreio}</div>` : "";
    const clienteInfo = (p.cliente||p.empresa||p.telefone) ? `<div class="card-cliente">
      ${p.cliente?`<strong>${p.cliente}</strong>`:""}
      ${p.empresa?`<span style="color:#6a6560">${p.empresa}</span>`:""}
      ${p.telefone?`<span style="color:#6a6560">📞 ${p.telefone}</span>`:""}
    </div>` : "";

    return `<div class="card" style="border-top-color:${dotColor}">
      <div class="card-header">
        <div class="tags">
          <span class="${tagClass}">${statusLabel}</span>
          <span class="tag tag-tipo">${tipoIcon[p.tipo]||""} ${p.tipo}</span>
        </div>
        <span class="card-data">${p.data||""}</span>
      </div>
      <div class="card-solicitante">${p.comercial}</div>
      <div class="card-material">${p.material}</div>
      ${clienteInfo}
      ${rastreioBox}
      ${acoes}
      ${enviadoInfo}
    </div>`;
  }).join("");
}

function abrirModal(e, id, novoStatus) {
  e.stopPropagation();
  modalPedido = pedidos.find(p => p.id === id);
  modalNovoStatus = novoStatus;
  if (!modalPedido) return;
  const titulos = {producao:"Iniciar produção",enviado:"Confirmar envio",recebido:"Voltar para Recebido"};
  document.getElementById("modal-titulo").textContent = titulos[novoStatus];
  document.getElementById("modal-sub").textContent = modalPedido.comercial + (modalPedido.cliente||modalPedido.empresa ? " · "+(modalPedido.cliente||modalPedido.empresa) : "");
  document.getElementById("modal-material").textContent = modalPedido.material;
  const mostrarRastreio = novoStatus === "enviado";
  document.getElementById("modal-rastreio-field").style.display = mostrarRastreio ? "block" : "none";
  if (mostrarRastreio) {
    document.getElementById("modal-rastreio-label").textContent = "Código de rastreio" + (modalPedido.tipo==="Correios"?" *":"");
    document.getElementById("modal-rastreio").value = "";
    document.getElementById("modal-rastreio").placeholder = modalPedido.tipo==="Correios" ? "Ex: AB962846400BR" : "Opcional para Motoboy";
  }
  document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
  modalPedido = null; modalNovoStatus = null;
}

async function confirmarUpdate() {
  if (!modalPedido) return;
  const rastreio = document.getElementById("modal-rastreio").value.trim();
  if (modalNovoStatus === "enviado" && modalPedido.tipo === "Correios" && !rastreio) {
    alert("Informe o código de rastreio para envios pelos Correios.");
    return;
  }
  document.getElementById("modal-confirmar").textContent = "Salvando...";
  document.getElementById("modal-confirmar").disabled = true;
  const payload = {
    action: "update_status",
    id: modalPedido.id,
    recebido: true,
    emProducao: modalNovoStatus === "producao" || modalNovoStatus === "enviado",
    finalizado: modalNovoStatus === "enviado",
    rastreio: rastreio,
  };
  try {
    await fetch(SCRIPT_URL, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),mode:"no-cors"});
    // Atualiza local
    const idx = pedidos.findIndex(p => p.id === modalPedido.id);
    if (idx !== -1) {
      pedidos[idx].recebido = true;
      pedidos[idx].emProducao = payload.emProducao;
      pedidos[idx].finalizado = payload.finalizado;
      if (rastreio) pedidos[idx].rastreio = rastreio;
      if (payload.finalizado) pedidos[idx].dataEnvio = new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
    }
    atualizarContadores();
    renderCards();
    fecharModal();
  } catch(e) {
    alert("Erro ao salvar. Tente novamente.");
  }
  document.getElementById("modal-confirmar").textContent = "Confirmar";
  document.getElementById("modal-confirmar").disabled = false;
}

// Carrega ao abrir
carregar();
</script>
</body>
</html>
