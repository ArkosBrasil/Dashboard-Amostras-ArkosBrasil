<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arkos — Fila de Produção</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f4f3f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1816}
    
.navbar{background:#fff;border-bottom:1px solid #e0ddd8;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:300;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.nav-logo{height:34px;object-fit:contain}
.nav-links{display:flex;gap:4px}
.nav-link{padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;color:#5a5550;text-decoration:none;transition:background .15s,color .15s}
.nav-link:hover{background:#f4f3f0;color:#1a1816}
.nav-link-active{background:#fff5f5;color:#c53030 !important;font-weight:700}

    /* LOGIN */
    .login-wrap{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:24px}
    .login-box{background:#fff;border-radius:10px;border:1px solid #e0ddd8;padding:36px 32px;max-width:360px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center}
    .login-box h2{font-size:16px;font-weight:700;margin-bottom:6px}
    .login-box p{font-size:12px;color:#8a8580;margin-bottom:24px}
    .login-box input{width:100%;padding:10px 14px;border:1px solid #d8d5d0;border-radius:6px;font-size:20px;letter-spacing:6px;text-align:center;font-family:inherit;outline:none;margin-bottom:12px}
    .login-box input:focus{border-color:#c53030}
    .login-box button{width:100%;padding:11px;background:#c53030;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit}
    .login-erro{font-size:12px;color:#c53030;margin-top:8px;display:none}
    /* FILA */
    #app{display:none}
    .header-fila{background:#fff;border-bottom:1px solid #e0ddd8;padding:12px 20px}
    .header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .header-title{font-size:15px;font-weight:700}
    .header-sub{font-size:11px;color:#8a8580;margin-top:2px}
    .btn-refresh{padding:7px 14px;background:#f4f3f0;border:1px solid #e0ddd8;border-radius:6px;cursor:pointer;font-size:12px;color:#5a5550;font-family:inherit}
    .filtros{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .btn-filtro{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:inherit;border:1.5px solid #e0ddd8;background:#f8f7f5;color:#6a6560;display:flex;align-items:center;gap:6px}
    .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
    .btn-filtro.f-rec{background:#fffbf0;border-color:#f5dcb0;color:#b06010}
    .btn-filtro.f-prod{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .btn-filtro.f-env{background:#f0fdf4;border-color:#bbf7d0;color:#15803d}
    .btn-filtro.f-all{background:#f1f5f9;border-color:#94a3b8;color:#334155}
    .busca-bar{background:#fff;border-bottom:1px solid #e0ddd8;padding:10px 20px}
    .busca-bar input{width:100%;max-width:480px;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;color:#1a1816}
    .content{padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
    .card{background:#fff;border-radius:8px;border:1px solid #e0ddd8;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.05);border-top:3px solid #e0ddd8}
    .card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .tags{display:flex;gap:6px;flex-wrap:wrap}
    .tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px}
    .tag-rec{background:#fffbf0;color:#b06010;border:1px solid #f5dcb0}
    .tag-prod{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .tag-env{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
    .tag-tipo{background:#f4f3f0;color:#6a6560;border:1px solid #e0ddd8}
    .card-data{font-size:11px;color:#8a8580;white-space:nowrap}
    .card-sol{font-size:13px;font-weight:700;color:#c53030;margin-bottom:4px}
    .card-mat{font-size:12px;color:#3a3835;line-height:1.5;white-space:pre-line;margin-bottom:8px}
    .card-cli{background:#f8f7f5;border-radius:4px;padding:8px 10px;font-size:11px;display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
    .card-rastreio{margin-top:6px;font-size:11px;color:#15803d;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:4px;padding:5px 10px}
    .card-actions{display:flex;gap:8px;margin-top:12px}
    .btn-prod{flex:1;padding:8px 12px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
    .btn-env{flex:1;padding:8px 12px;background:#c53030;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
    .btn-back{padding:8px 12px;background:#f4f3f0;color:#5a5550;border:1px solid #e0ddd8;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit}
    .env-info{margin-top:10px;font-size:11px;color:#15803d}
    .empty{text-align:center;padding:60px 0;color:#8a8580;font-size:13px}
    .loading{text-align:center;padding:60px 0;color:#8a8580;font-size:13px}
    .erro-box{background:#fff5f5;border:1px solid #fcc;border-radius:6px;padding:10px 14px;font-size:12px;color:#c53030;margin-bottom:16px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:10px;padding:24px;width:90%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
    .modal h3{font-size:15px;font-weight:700;margin-bottom:4px}
    .modal-sub{font-size:12px;color:#8a8580;margin-bottom:10px}
    .modal-mat{font-size:12px;color:#5a5550;line-height:1.5;white-space:pre-line;max-height:80px;overflow-y:auto;margin-bottom:16px;background:#f8f7f5;border-radius:4px;padding:8px 10px}
    .modal label{font-size:11px;font-weight:600;color:#5a5550;display:block;margin-bottom:5px}
    .modal input{width:100%;background:#f8f7f5;border:1px solid #d8d5d0;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:16px}
    .modal-actions{display:flex;gap:8px}
  </style>
</head>

</div>

<!-- MODAL -->
<div class="overlay" id="modal-overlay" onclick="fecharModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-titulo"></h3>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-mat" id="modal-mat"></div>
    <div id="modal-rastreio-wrap" style="display:none">
      <label id="modal-rastreio-label">Código de rastreio</label>
      <input type="text" id="modal-rastreio" placeholder="Ex: AB962846400BR"/>
    </div>
    <div class="modal-actions">
      <button class="btn-env" id="modal-confirmar" onclick="confirmar()" style="flex:1">Confirmar</button>
      <button class="btn-back" onclick="fecharModal()" style="flex:1">Cancelar</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwfENYrCbmgdBzI5qgn2sy0llromxbaXd5u14kxT9HkRXtIMqBg7xGqqbbgw9C9uiKC/exec";
const SENHA_CORRETA = "1989";
let pedidos=[], filtro="recebido", modalPedido=null, modalStatus=null;

// ── LOGIN ──
function verificarSenha(){
  const s=document.getElementById("senha-input").value;
  if(s===SENHA_CORRETA){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    carregar();
  }else{
    document.getElementById("login-erro").style.display="block";
    document.getElementById("senha-input").value="";
    document.getElementById("senha-input").focus();
  }
}

// ── DADOS ──
function getStatus(p){return p.finalizado?"enviado":p.emProducao?"producao":"recebido";}

async function carregar(){
  document.getElementById("loading").style.display="block";
  document.getElementById("grid").style.display="none";
  document.getElementById("empty").style.display="none";
  document.getElementById("erro-box").style.display="none";
  try{
    const r=await fetch(SCRIPT_URL+"?action=fila");
    const d=await r.json();
    if(d.success){pedidos=d.pedidos.reverse();atualizarContadores();renderCards();}
    else{mostrarErro("Erro: "+d.error);}
  }catch(e){mostrarErro("Não foi possível conectar ao servidor.");}
  document.getElementById("loading").style.display="none";
}

function mostrarErro(m){const e=document.getElementById("erro-box");e.textContent=m;e.style.display="block";}

function atualizarContadores(){
  const c={recebido:0,producao:0,enviado:0};
  pedidos.forEach(p=>c[getStatus(p)]++);
  document.getElementById("c-rec").textContent=c.recebido;
  document.getElementById("c-prod").textContent=c.producao;
  document.getElementById("c-env").textContent=c.enviado;
  document.getElementById("c-all").textContent=pedidos.length;
}

function setFiltro(f){
  filtro=f;
  [["f-rec","f-rec"],["f-prod","f-prod"],["f-env","f-env"],["f-all","f-all"]].forEach(([id])=>document.getElementById(id).className="btn-filtro");
  const cls={recebido:"f-rec",producao:"f-prod",enviado:"f-env",todos:"f-all"};
  document.getElementById("f-"+{recebido:"rec",producao:"prod",enviado:"env",todos:"all"}[f]).classList.add(cls[f]);
  renderCards();
}

function renderCards(){
  const busca=document.getElementById("busca").value.toLowerCase();
  const lista=pedidos.filter(p=>{
    const s=getStatus(p);
    return(filtro==="todos"||s===filtro)&&(!busca||[p.comercial,p.cliente,p.empresa,p.material].join(" ").toLowerCase().includes(busca));
  });
  const grid=document.getElementById("grid"),empty=document.getElementById("empty");
  if(!lista.length){grid.style.display="none";empty.style.display="block";empty.textContent=busca?"Nenhum pedido encontrado.":"Nenhum pedido neste status.";return;}
  grid.style.display="grid";empty.style.display="none";
  const icon={Motoboy:"🛵",Correios:"📦",Representantes:"🤝"};
  const dotColor={recebido:"#f59e0b",producao:"#3b82f6",enviado:"#22c55e"};
  const tagCls={recebido:"tag-rec",producao:"tag-prod",enviado:"tag-env"};
  const tagLabel={recebido:"Recebido",producao:"Em Produção",enviado:"Enviado"};
  grid.innerHTML=lista.map(p=>{
    const s=getStatus(p);
    const cli=p.cliente||p.empresa?"<div class='card-cli'>"+(p.cliente?`<strong>${p.cliente}</strong>`:"")+
      (p.empresa?`<span style='color:#6a6560'>${p.empresa}</span>`:"")+
      (p.telefone?`<span style='color:#6a6560'>📞 ${p.telefone}</span>`:"")+
      "</div>":"";
    const rastreio=p.rastreio?`<div class='card-rastreio'>🚚 ${p.rastreio}</div>`:"";
    const acoes=s==="recebido"?
      `<div class='card-actions'><button class='btn-prod' onclick='abrirModal("${p.id}","producao")'>Iniciar produção →</button></div>`:
      s==="producao"?
      `<div class='card-actions'><button class='btn-back' onclick='abrirModal("${p.id}","recebido")'>← Voltar</button><button class='btn-env' onclick='abrirModal("${p.id}","enviado")'>Marcar como enviado ✓</button></div>`:"";
    const envInfo=s==="enviado"&&p.dataEnvio?`<div class='env-info'>✓ Enviado em ${p.dataEnvio}</div>`:"";
    return `<div class='card' style='border-top-color:${dotColor[s]}'>
      <div class='card-head'><div class='tags'><span class='tag ${tagCls[s]}'>${tagLabel[s]}</span><span class='tag tag-tipo'>${icon[p.tipo]||""} ${p.tipo}</span></div><span class='card-data'>${p.data||""}</span></div>
      <div class='card-sol'>${p.comercial}</div>
      <div class='card-mat'>${p.material}</div>
      ${cli}${rastreio}${acoes}${envInfo}
    </div>`;
  }).join("");
}

// ── MODAL ──
function abrirModal(id,novoStatus){
  modalPedido=pedidos.find(p=>p.id===id); modalStatus=novoStatus;
  if(!modalPedido)return;
  const titulos={producao:"Iniciar produção",enviado:"Confirmar envio",recebido:"Voltar para Recebido"};
  document.getElementById("modal-titulo").textContent=titulos[novoStatus];
  document.getElementById("modal-sub").textContent=modalPedido.comercial+(modalPedido.cliente||modalPedido.empresa?" · "+(modalPedido.cliente||modalPedido.empresa):"");
  document.getElementById("modal-mat").textContent=modalPedido.material;
  const showR=novoStatus==="enviado";
  document.getElementById("modal-rastreio-wrap").style.display=showR?"block":"none";
  if(showR){document.getElementById("modal-rastreio-label").textContent="Código de rastreio"+(modalPedido.tipo==="Correios"?" *":"");document.getElementById("modal-rastreio").value="";}
  document.getElementById("modal-overlay").classList.add("open");
}

function fecharModal(){document.getElementById("modal-overlay").classList.remove("open");modalPedido=null;modalStatus=null;}

async function confirmar(){
  if(!modalPedido)return;
  const rastreio=(document.getElementById("modal-rastreio").value||"").trim();
  if(modalStatus==="enviado"&&modalPedido.tipo==="Correios"&&!rastreio){alert("Informe o código de rastreio para Correios.");return;}
  document.getElementById("modal-confirmar").textContent="Salvando...";
  document.getElementById("modal-confirmar").disabled=true;
  const payload={action:"update_status",id:modalPedido.id,recebido:true,
    emProducao:modalStatus==="producao"||modalStatus==="enviado",
    finalizado:modalStatus==="enviado",rastreio};
  try{
    await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),mode:"no-cors"});
    const idx=pedidos.findIndex(p=>p.id===modalPedido.id);
    if(idx>=0){pedidos[idx].emProducao=payload.emProducao;pedidos[idx].finalizado=payload.finalizado;if(rastreio)pedidos[idx].rastreio=rastreio;if(payload.finalizado)pedidos[idx].dataEnvio=new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});}
    atualizarContadores();renderCards();fecharModal();
  }catch(e){alert("Erro ao salvar. Tente novamente.");}
  document.getElementById("modal-confirmar").textContent="Confirmar";
  document.getElementById("modal-confirmar").disabled=false;
}

document.addEventListener("keydown",e=>{if(e.key==="Escape")fecharModal();});
</script>
</body>
</html>
