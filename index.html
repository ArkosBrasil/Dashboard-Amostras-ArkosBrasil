<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkos — Dashboard de Pedidos</title>
<style>
:root{--bg:#fff;--bg2:#f5f4f1;--bg3:#efefec;--text:#1a1a18;--text2:#6b6b67;--text3:#a0a09c;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.18);--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;}

.navbar{background:var(--bg);border-bottom:.5px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:300;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.nav-logo{height:34px;object-fit:contain}
.nav-links{display:flex;gap:4px}
.nav-link{padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;color:#5a5550;text-decoration:none;transition:background .15s,color .15s}
.nav-link:hover{background:var(--bg2);color:var(--text)}
.nav-link-active{background:#fff5f5;color:#c53030 !important;font-weight:700}

/* App */
.topbar{background:var(--bg);border-bottom:.5px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:48px;}
.sync-row{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.sdot{width:6px;height:6px;border-radius:50%;background:#639922;}
.sdot.loading{background:#BA7517;animation:pulse 1s infinite;}
.sdot.error{background:#A32D2D;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-sm{font-size:12px;padding:5px 12px;border:.5px solid var(--border2);border-radius:20px;background:none;cursor:pointer;color:var(--text2);}
.btn-sm:hover{background:var(--bg2);}
.view-bar{background:var(--bg);border-bottom:.5px solid var(--border);padding:0 1.5rem;display:flex;}
.view-btn{padding:11px 18px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;}
.view-btn.active{color:var(--text);border-bottom-color:var(--text);}
.main{max-width:1400px;margin:0 auto;padding:1.25rem 1.5rem;}
.err-bar{background:#FCEBEB;color:#A32D2D;font-size:13px;padding:9px 13px;border-radius:var(--r);margin-bottom:1rem;display:none;}
.stabs{display:flex;gap:2px;border-bottom:.5px solid var(--border);margin-bottom:1rem;overflow-x:auto;}
.stab{padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.stab.active{color:var(--text);}
.filters{display:flex;gap:14px;margin-bottom:.75rem;flex-wrap:wrap;align-items:flex-start;}
.fgroup{display:flex;flex-direction:column;gap:5px;}
.fgroup-label{font-size:11px;font-weight:500;color:var(--text2);}
.fbuts{display:flex;gap:4px;flex-wrap:wrap;}
.fbtn{padding:4px 11px;font-size:12px;border:.5px solid var(--border2);border-radius:20px;background:var(--bg);cursor:pointer;color:var(--text2);user-select:none;}
.fbtn:hover{border-color:var(--text3);}
.fbtn.active{background:var(--text);color:var(--bg);border-color:transparent;}
.fbtn.c-red{border-color:#A32D2D;color:#A32D2D;}.fbtn.c-red.active{background:#A32D2D;color:#fff;}
.fbtn.c-amber{border-color:#854F0B;color:#854F0B;}.fbtn.c-amber.active{background:#854F0B;color:#fff;}
.fbtn.c-green{border-color:#3B6D11;color:#3B6D11;}.fbtn.c-green.active{background:#3B6D11;color:#fff;}
.divider{height:.5px;background:var(--border);margin:10px 0;}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem;}
.metric{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:11px 13px;cursor:pointer;}
.metric:hover{border-color:var(--border2);}
.mlabel{font-size:11px;color:var(--text2);margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.mdot{width:6px;height:6px;border-radius:50%;}
.mval{font-size:22px;font-weight:500;}
.vr{color:#A32D2D;}.va{color:#854F0B;}.vg{color:#3B6D11;}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;padding:8px 12px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);width:fit-content;}
.month-nav span{font-size:13px;font-weight:500;min-width:130px;text-align:center;}
.mnbtn{width:26px;height:26px;border:.5px solid var(--border2);border-radius:50%;background:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.mnbtn:hover:not(:disabled){background:var(--bg2);}
.mnbtn:disabled{opacity:.3;cursor:default;}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text2);padding:7px 11px;background:var(--bg3);border-radius:var(--r);margin-bottom:1rem;}
.li{display:flex;align-items:center;gap:4px;}
.ld{width:8px;height:8px;border-radius:50%;}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;}
.week-nav strong{font-size:13px;}
.week-note{font-size:12px;color:var(--text3);}
.kanban{display:grid;gap:14px;}
.kcol-head{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.kcol-dot{width:8px;height:8px;border-radius:50%;}
.timeline{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;align-items:flex-start;}
.tday{flex:0 0 220px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.tday.late{border-color:#F09595;}.tday.today{border-color:#EF9F27;}
.tday-head{padding:10px 13px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.tday.late .tday-head{background:#FCEBEB;color:#A32D2D;}
.tday.today .tday-head{background:#FAEEDA;color:#854F0B;}
.tday.future .tday-head{background:var(--bg2);color:var(--text2);}
.tday-sub{font-size:10px;font-weight:400;margin-top:1px;}
.tday-count{font-size:10px;opacity:.7;}
.tday-body{padding:8px;}
.no-orders{font-size:12px;color:var(--text3);padding:6px 0;text-align:center;}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:13px;margin-bottom:8px;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
.card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.card:last-child{margin-bottom:0;}
.card.sent{opacity:.6;}
.card.in-tl{background:var(--bg2);border-radius:var(--r);margin-bottom:6px;}
.card.in-tl:hover{background:var(--bg3);}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:6px;}
.bst{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.sr{background:#EAF3DE;color:#3B6D11;}.sm{background:#FAEEDA;color:#854F0B;}.se{background:#D3D1C7;color:#444441;}
.card-client{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-empresa{font-size:11px;color:var(--text2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-mat{font-size:12px;color:var(--text2);line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-foot{display:flex;justify-content:space-between;align-items:center;font-size:11px;}
.bcom{font-size:10px;padding:2px 7px;background:var(--bg2);border-radius:20px;color:var(--text2);border-left-width:2px;border-left-style:solid;padding-left:6px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:9px;}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;align-items:center;justify-content:center;padding:1.5rem;}
.overlay.open{display:flex;}
.modal{background:var(--bg);border-radius:var(--rl);max-width:520px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal-head{padding:18px 20px 14px;border-bottom:.5px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;position:sticky;top:0;background:var(--bg);}
.modal-title{font-size:15px;font-weight:600;line-height:1.3;}
.modal-close{width:28px;height:28px;border:none;background:var(--bg2);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.modal-body{padding:18px 20px;}
.msec{margin-bottom:16px;}.msec:last-child{margin-bottom:0;}
.msec-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.mfield{display:flex;gap:10px;margin-bottom:6px;font-size:13px;}
.mk{color:var(--text2);min-width:80px;flex-shrink:0;font-size:12px;padding-top:1px;}
.mv{color:var(--text);word-break:break-word;line-height:1.5;}
.mv a{color:#185FA5;text-decoration:none;}.mv a:hover{text-decoration:underline;}
.modal-mat{font-size:13px;color:var(--text);line-height:1.6;background:var(--bg2);padding:10px 13px;border-radius:var(--r);white-space:pre-wrap;}
.status-track{display:flex;margin-bottom:4px;}
.track-step{flex:1;text-align:center;font-size:12px;padding:7px 4px;border-top:2px solid var(--border);color:var(--text3);}
.track-step.done{border-top-color:#3B6D11;color:#3B6D11;font-weight:500;}
.track-step.active{border-top-color:#BA7517;color:#854F0B;font-weight:500;}
</style>
</head>

<script>
const SHEETS_CFG = {
  'SP Motoboy':    {color:'#378ADD', label:'SP · Motoboy'},
  'SP Correios':   {color:'#639922', label:'SP · Correios'},
  'Rep. Especiais':{color:'#D85A30', label:'Representantes'},
};
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS  = ['Segunda','Terça','Quarta','Quinta','Sexta'];
const API_URL = 'https://script.google.com/macros/s/AKfycbwfENYrCbmgdBzI5qgn2sy0llromxbaXd5u14kxT9HkRXtIMqBg7xGqqbbgw9C9uiKC/exec';

let allData = {}, timer = null;
let activeSheet = 'SP Motoboy';
let currentView = 'status';
let selCom    = new Set(['Todos']);
let selStatus = new Set(['all']);
let selCanal  = new Set(['Todos']);
let enviadoMonth = null;
let weekOffset   = 0;

const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function startApp(){
  document.getElementById('app').style.display='block';
  enviadoMonth = {y: TODAY.getFullYear(), m: TODAY.getMonth()};
  loadData();
  if(timer) clearInterval(timer);
  timer = setInterval(loadData, 60000);
}

function fetchJSONP(url){
  return new Promise((res,rej)=>{
    const cb='_a'+Date.now();
    const s=document.createElement('script');
    const t=setTimeout(()=>{cleanup();rej(new Error('Timeout'));'},18000);
    function cleanup(){clearTimeout(t);delete window[cb];s.parentNode&&s.parentNode.removeChild(s);}
    window[cb]=d=>{cleanup();res(d);};
    s.onerror=()=>{cleanup();rej(new Error('Erro de rede'));};
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&t='+Date.now();
    document.head.appendChild(s);
  });
}

async function loadData(){
  setSS('loading','Atualizando…');
  try{
    const d = await fetchJSONP(API_URL);
    allData = d.sheets || {};
    const ts = d.timestamp ? new Date(d.timestamp).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
    setSS('ok','Atualizado'+(ts?' às '+ts:''));
    hideErr(); render();
  }catch(e){setSS('error','Erro');showErr('Falha ao carregar: '+e.message);}
}
function setSS(s,l){document.getElementById('sd').className='sdot'+(s==='loading'?' loading':s==='error'?' error':'');document.getElementById('sl').textContent=l;}
function showErr(m){const b=document.getElementById('eb');b.textContent=m;b.style.display='block';}
function hideErr(){document.getElementById('eb').style.display='none';}

function parseDate(s){if(!s)return null;s=String(s).trim();const m=s.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?$/);if(!m)return null;return new Date(m[3]?+m[3]:TODAY.getFullYear(),+m[2]-1,+m[1]);}
function dlClass(dt){if(!dt)return'none';const d=(dt-TODAY)/86400000;if(d<0)return'late';if(d<1)return'today';if(d<4)return'soon';return'ok';}
function dlLabel(dt){if(!dt)return'Sem previsão';const d=Math.round((dt-TODAY)/86400000);if(d<0)return`Atrasado ${Math.abs(d)}d`;if(d===0)return'Hoje!';if(d===1)return'Amanhã';return`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDay(d){return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;}
function sameDay(a,b){return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function getWeekStart(){const d=new Date(TODAY);const dow=d.getDay();const diff=dow===0?-6:1-dow;d.setDate(d.getDate()+diff+weekOffset*7);d.setHours(0,0,0,0);return d;}
function getStatus(o){if(o.final)return{label:'Enviado',cls:'se',key:'env'};if(o.prod)return{label:'Em produção',cls:'sm',key:'prod'};return{label:'Recebido',cls:'sr',key:'rec'};}
function getOrders(){return allData[activeSheet]||[];}
function getAllOrders(){return Object.entries(allData).filter(([k])=>SHEETS_CFG[k]).flatMap(([sheet,orders])=>(orders||[]).map(o=>(({...o,_sheet:sheet}))))}
function clientLabel(o){return(o.cli||o.empresa||o.com||'—').trim();}
function empresaLabel(o){const cli=(o.cli||'').trim(),emp=(o.empresa||'').trim();if(emp&&cli&&emp!==cli)return emp;return'';}
function isInMonth(o){const dt=parseDate(o.envio||o.prev);if(!dt)return false;return dt.getMonth()===enviadoMonth.m&&dt.getFullYear()===enviadoMonth.y;}

function setView(v){currentView=v;document.getElementById('vb-status').className='view-btn'+(v==='status'?' active':'');document.getElementById('vb-crono').className='view-btn'+(v==='crono'?' active':'');document.getElementById('filt-status').style.display=v==='status'?'':'none';document.getElementById('filt-crono').style.display=v==='crono'?'':'none';document.getElementById('stabs').style.display=v==='status'?'':'none';document.getElementById('metrics').style.display=v==='status'?'':'none';document.getElementById('legend').style.display=v==='status'?'':'none';renderFilters();renderContent();}
function render(){renderTabs();renderFilters();renderMetrics();renderLegend();renderContent();}
function renderTabs(){document.getElementById('stabs').innerHTML=Object.entries(SHEETS_CFG).map(([k,cfg])=>{const act=activeSheet===k;const cnt=(allData[k]||[]).filter(o=>!o.final).length;return`<button class="stab${act?' active':''}" style="${act?'border-bottom-color:'+cfg.color+';color:'+cfg.color:''}" onclick="setSheet(this)" data-sheet="${k}">${cfg.label} <span style="font-size:10px;opacity:.6;">${cnt}</span></button>`;'}).join('');}
function renderFilters(){const orders=getOrders();const coms=['Todos',...new Set(orders.map(o=>o.com).filter(Boolean).sort())];document.getElementById('f-com').innerHTML=coms.map(c=>{const active=selCom.has(c);return`<button class="fbtn${active?' active':''}" onclick="toggleCom(this)" data-val="${escAttr(c)}">${escHtml(c)}</button>`;}).join('');const sts=[{id:'all',label:'Todos'},{id:'rec',label:'Recebido',cls:'c-green'},{id:'prod',label:'Em produção',cls:'c-amber'},{id:'env',label:'Enviado'}];document.getElementById('f-status').innerHTML=sts.map(s=>{const active=selStatus.has(s.id);return`<button class="fbtn ${s.cls||''}${active?' active':''}" onclick="toggleStatus(this)" data-val="${s.id}">${s.label}</button>`;}).join('');const showEnv=selStatus.has('env')&&!selStatus.has('all');document.getElementById('month-wrap').style.display=showEnv?'':'none';if(showEnv){const isCur=enviadoMonth.y===TODAY.getFullYear()&&enviadoMonth.m===TODAY.getMonth();document.getElementById('m-label').textContent=`${MESES[enviadoMonth.m]} ${enviadoMonth.y}`;document.getElementById('m-next').disabled=isCur;}const canais=['Todos',...Object.keys(SHEETS_CFG)];document.getElementById('f-canal').innerHTML=canais.map(c=>{const cfg=SHEETS_CFG[c];const active=selCanal.has(c);return`<button class="fbtn${active?' active':''}" style="${active&&cfg?'background:'+cfg.color+';border-color:'+cfg.color:''}" onclick="toggleCanal(this)" data-val="${escAttr(c)}">${cfg?cfg.label:c}</button>`;}).join('');const ws=getWeekStart();const we=addDays(ws,4);document.getElementById('wk-label').textContent=`${fmtDay(ws)} — ${fmtDay(we)}`;document.getElementById('wk-note').textContent=weekOffset===0?'Semana atual':weekOffset<0?`${Math.abs(weekOffset)} semana(s) atrás`:`${weekOffset} semana(s) à frente`;}
function renderMetrics(){const orders=getOrders();const late=orders.filter(o=>{const dt=parseDate(o.prev);return dt&&dlClass(dt)==='late'&&!o.final;}).length;const tod=orders.filter(o=>{const dt=parseDate(o.prev);return dt&&dlClass(dt)==='today'&&!o.final;}).length;const rec=orders.filter(o=>getStatus(o).key==='rec').length;const prod=orders.filter(o=>getStatus(o).key==='prod').length;const ms=[{l:'Atrasados',v:late,dot:'#A32D2D',vc:'vr',status:'env'},{l:'Para hoje',v:tod,dot:'#BA7517',vc:'va',status:'env'},{l:'Recebido',v:rec,dot:'#3B6D11',vc:'',status:'rec'},{l:'Em produção',v:prod,dot:'#BA7517',vc:'va',status:'prod'}];document.getElementById('metrics').innerHTML=ms.map(m=>`<div class="metric" data-status="${m.status}" onclick="metricClick(this)"><div class="mlabel"><span class="mdot" style="background:${m.dot}"></span>${m.l}</div><div class="mval ${m.vc}">${m.v}</div></div>`).join('');}
function metricClick(el){selStatus=new Set([el.dataset.status]);renderFilters();renderContent();}
function renderLegend(){document.getElementById('legend').innerHTML=`<span class="li"><span class="ld" style="background:#3B6D11"></span>Recebido</span><span class="li"><span class="ld" style="background:#BA7517"></span>Em produção</span><span class="li"><span class="ld" style="background:#888780"></span>Enviado</span>`;}
function renderContent(){if(currentView==='status')renderStatusView();else renderCronoView();}

function renderStatusView(){let orders=getOrders();if(!selCom.has('Todos')){orders=orders.filter(o=>selCom.has(o.com));}const showAll=selStatus.has('all');if(!showAll){orders=orders.filter(o=>selStatus.has(getStatus(o).key));}const onlyEnv=!showAll&&selStatus.size===1&&selStatus.has('env');if(onlyEnv){orders=orders.filter(isInMonth);const color=SHEETS_CFG[activeSheet]?.color||'#888';if(!orders.length){document.getElementById('content').innerHTML=`<div class="empty">Nenhum envio em ${MESES[enviadoMonth.m]} ${enviadoMonth.y}.</div>`;return;}document.getElementById('content').innerHTML=`<div class="cards-grid">${orders.map(o=>makeCard(o,color,'grid')).join('')}</div>`;return;}if(showAll)orders=orders.filter(o=>!o.final);if(!orders.length){document.getElementById('content').innerHTML='<div class="empty">Nenhum pedido para os filtros selecionados.</div>';return;}const cols=[{key:'rec',label:'Recebido',dot:'#3B6D11'},{key:'prod',label:'Em produção',dot:'#BA7517'}];const visibleCols=showAll||selStatus.size>1?cols:cols.filter(c=>selStatus.has(c.key));const ncols=visibleCols.length||2;const color=SHEETS_CFG[activeSheet]?.color||'#888';let html=`<div class="kanban" style="grid-template-columns:repeat(${ncols},minmax(0,1fr))">`;visibleCols.forEach(col=>{const items=orders.filter(o=>getStatus(o).key===col.key);html+=`<div><div class="kcol-head"><span class="kcol-dot" style="background:${col.dot}"></span>${col.label} <span style="color:var(--text3);font-weight:400;">${items.length}</span></div>${items.length?items.map(o=>makeCard(o,color,'kanban')).join(''):'<div style="font-size:13px;color:var(--text3);padding:4px 0;">Nenhum pedido</div>'}</div>`;});html+='</div>';document.getElementById('content').innerHTML=html;}

function renderCronoView(){let orders=getAllOrders().filter(o=>!o.final);if(!selCanal.has('Todos')){orders=orders.filter(o=>selCanal.has(o._sheet));}const ws=getWeekStart();const weekDays=[0,1,2,3,4].map(i=>addDays(ws,i));const byDay=weekDays.map(d=>(({day:d,orders:[]})));const noDate=[],other=[];orders.forEach(o=>{const dt=parseDate(o.prev);if(!dt){noDate.push(o);return;}const idx=byDay.findIndex(g=>sameDay(g.day,dt));if(idx>=0)byDay[idx].orders.push(o);else other.push(o);});let html='<div class="timeline">';byDay.forEach((g,i)=>{const isToday=sameDay(g.day,TODAY);const isPast=g.day<TODAY&&!isToday;const cls=isPast?'late':isToday?'today':'future';html+=`<div class="tday ${cls}"><div class="tday-head"><div><div>${DIAS[i]}</div><div class="tday-sub">${fmtDay(g.day)}</div></div><span class="tday-count">${g.orders.length}</span></div><div class="tday-body">`;if(!g.orders.length)html+=`<div class="no-orders">—</div>`;g.orders.forEach(o=>{html+=makeCard(o,SHEETS_CFG[o._sheet]?.color||'#888','tl');});html+=`</div></div>`;});if(other.length){other.sort((a,b)=>(parseDate(a.prev)||new Date(9999,0))-(parseDate(b.prev)||new Date(9999,0)));html+=`<div class="tday future" style="flex:0 0 200px"><div class="tday-head"><div>Outra data</div><span class="tday-count">${other.length}</span></div><div class="tday-body">`;other.forEach(o=>{html+=makeCard(o,SHEETS_CFG[o._sheet]?.color||'#888','tl');});html+=`</div></div>`;}if(noDate.length){html+=`<div class="tday future" style="flex:0 0 200px"><div class="tday-head"><div>Sem previsão</div><span class="tday-count">${noDate.length}</span></div><div class="tday-body">`;noDate.forEach(o=>{html+=makeCard(o,SHEETS_CFG[o._sheet]?.color||'#888','tl');});html+=`</div></div>`;}html+='</div>';if(!orders.length)html='<div class="empty">Nenhum pedido aberto para este período.</div>';document.getElementById('content').innerHTML=html;}

function makeCard(o,color,mode){const st=getStatus(o);const dt=parseDate(o.prev);const dc=dlClass(dt);const dlColor=dc==='late'&&!o.final?'color:#A32D2D;font-weight:500':dc==='today'&&!o.final?'color:#854F0B;font-weight:500':'color:var(--text2)';const footDate=o.final&&o.envio?'Enviado '+o.envio:dlLabel(dt);const cli=clientLabel(o);const emp=empresaLabel(o);const cls='card'+(o.final?' sent':'')+(mode==='tl'?' in-tl':'');const id='c'+Math.random().toString(36).slice(2,8);window.__cards=window.__cards||{};window.__cards[id]=o;return`<div class="${cls}" data-id="${id}" onclick="openCardModal(this)"><div class="card-head"><div style="min-width:0;flex:1;"><div class="card-client">${escHtml(cli)}</div>${emp?`<div class="card-empresa">${escHtml(emp)}</div>`:''}</div><span class="bst ${st.cls}">${st.label}</span></div><div class="card-mat">${escHtml(o.mat||'')}</div><div class="card-foot"><span style="font-size:11px;${dlColor}">${footDate}</span><span class="bcom" style="border-left-color:${color}">${escHtml(o.com||'')}</span></div></div>`;}

function openCardModal(el){const o=window.__cards[el.dataset.id];if(!o)return;openModal(o);}
function openModal(o){const st=getStatus(o);const dt=parseDate(o.prev);const cli=clientLabel(o);document.getElementById('m-title').textContent=cli;const steps=[{label:'Recebido',done:o.rec||o.prod||o.final,active:o.rec&&!o.prod&&!o.final},{label:'Em produção',done:o.prod||o.final,active:o.prod&&!o.final},{label:'Enviado',done:o.final,active:false}];let body=`<div class="msec"><div class="msec-label">Status</div><div class="status-track">${steps.map(s=>`<div class="track-step ${s.done&&!s.active?'done':s.active?'active':''}">${s.done?'✓ ':''}</div>`).join('')}</div></div>`;body+=`<div class="msec"><div class="msec-label">Material solicitado</div><div class="modal-mat">${escHtml(o.mat||'—')}</div></div>`;let datesHtml='';if(o.dataPed)datesHtml+=mf('Pedido em',o.dataPed);if(o.prev){const dc=dlClass(dt);const alert=dc==='late'?' <span style="color:#A32D2D">(atrasado)</span>':dc==='today'?' <span style="color:#854F0B">(hoje!)</span>':'';datesHtml+=`<div class="mfield"><span class="mk">Previsão</span><span class="mv">${o.prev}${alert}</span></div>`;}if(o.envio)datesHtml+=mf('Enviado em',o.envio);if(datesHtml)body+=`<div class="msec"><div class="msec-label">Datas</div>${datesHtml}</div>`;let cliHtml='';if(o.empresa)cliHtml+=mf('Empresa',escHtml(o.empresa));if(o.cnpj)cliHtml+=mf('CNPJ/CPF',escHtml(o.cnpj));if(o.endereco){const maps=`https://maps.google.com/?q=${encodeURIComponent(o.endereco+(o.cep?' '+o.cep:''))}`;cliHtml+=`<div class="mfield"><span class="mk">Endereço</span><span class="mv"><a href="${maps}" target="_blank">${escHtml(o.endereco)}${o.cep?' · CEP '+escHtml(o.cep):''} ↗</a></span></div>`;}if(o.email)cliHtml+=`<div class="mfield"><span class="mk">E-mail</span><span class="mv"><a href="mailto:${escAttr(o.email)}">${escHtml(o.email)}</a></span></div>`;if(o.contato)cliHtml+=`<div class="mfield"><span class="mk">Telefone</span><span class="mv"><a href="tel:${o.contato.replace(/\D/g,'')}">${escHtml(o.contato)}</a></span></div>`;if(cliHtml)body+=`<div class="msec"><div class="msec-label">Dados do cliente</div>${cliHtml}</div>`;if(o.rastreio)body+=`<div class="msec"><div class="msec-label">Rastreio</div><div class="mfield"><span class="mk">Código</span><span class="mv"><a href="https://rastreamento.correios.com.br/app/index.php" target="_blank">${escHtml(o.rastreio)} ↗</a></span></div></div>`;let solHtml=mf('Comercial',escHtml(o.com||'—'));if(o.qty)solHtml+=mf('Quantidade',String(o.qty));body+=`<div class="msec"><div class="msec-label">Solicitação</div>${solHtml}</div>`;document.getElementById('m-body').innerHTML=body;document.getElementById('overlay').classList.add('open');document.body.style.overflow='hidden';}
function mf(k,v){return`<div class="mfield"><span class="mk">${k}</span><span class="mv">${v}</span></div>`;}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function toggleCom(btn){const v=btn.dataset.val;if(v==='Todos'){selCom=new Set(['Todos']);}else{selCom.delete('Todos');if(selCom.has(v))selCom.delete(v);else selCom.add(v);if(selCom.size===0)selCom=new Set(['Todos']);}renderFilters();renderContent();}
function toggleStatus(btn){const v=btn.dataset.val;if(v==='all'){selStatus=new Set(['all']);}else{selStatus.delete('all');if(selStatus.has(v))selStatus.delete(v);else selStatus.add(v);if(selStatus.size===0)selStatus=new Set(['all']);}renderFilters();renderContent();}
function toggleCanal(btn){const v=btn.dataset.val;if(v==='Todos'){selCanal=new Set(['Todos']);}else{selCanal.delete('Todos');if(selCanal.has(v))selCanal.delete(v);else selCanal.add(v);if(selCanal.size===0)selCanal=new Set(['Todos']);}renderFilters();renderContent();}
function setSheet(btn){activeSheet=btn.dataset.sheet;selCom=new Set(['Todos']);selStatus=new Set(['all']);render();}
function changeMonth(d){let {y,m}=enviadoMonth;m+=d;if(m<0){m=11;y--;}if(m>11){m=0;y++;}const now=TODAY;if(y>now.getFullYear()||(y===now.getFullYear()&&m>now.getMonth()))return;enviadoMonth={y,m};renderFilters();renderContent();}
function changeWeek(d){weekOffset+=d;renderFilters();renderContent();}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// Auto-start
startApp();
</script>
</body>
</html>
