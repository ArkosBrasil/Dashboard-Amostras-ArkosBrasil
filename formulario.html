<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

// ── Cole aqui a URL do seu Web App do Apps Script ──
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwfENYrCbmgdBzI5qgn2sy0llromxbaXd5u14kxT9HkRXtIMqBg7xGqqbbgw9C9uiKC/exec";

const SOLICITANTES = [
  "Sarah", "Tati", "Tamara", "Greyce", "Marco Aurélio",
  "Samantha", "Larissa", "Outro"
];

const REPRESENTANTES = [
  "Abitare", "Adson", "Amós", "Archblend", "Atrio",
  "BoBrasil", "Casa Galle", "Ecogreen", "Innovare", "Jordan",
  "Kely", "Miguel (Forefront)", "Nivaldo", "Pérzia", "Raphis",
  "Screenydecor", "Solutio", "Stella", "Steerman", "Sunfix",
  "Teamflex", "Viggiano", "Vitor", "Wedo", "Outro"
];

const URGENCIAS = [
  { value: "Normal", label: "Normal", color: "#2a7a4a", bg: "#f0faf2" },
  { value: "Urgente", label: "⚡ Urgente", color: "#b06010", bg: "#fffbf0" },
  { value: "Muito Urgente", label: "🔴 Muito Urgente", color: "#c53030", bg: "#fff5f5" },
];

const EMPTY = {
  solicitante: "", solicitanteOutro: "", tipoEnvio: "",
  material: "", nomeCliente: "", empresa: "",
  cpfCnpj: "", endereco: "", cep: "", email: "",
  telefone: "", urgencia: "Normal", observacao: "",
};

export default function FormularioAmostras() {
  const [form, setForm] = useState(EMPTY);
  const [status, setStatus] = useState("idle");

  const set = (field) => (e) => setForm((f) => ({ ...f, [field]: e.target.value }));

  const isCorreios = form.tipoEnvio === "Correios";
  const solicitanteValido = form.solicitante === "Outro"
    ? form.solicitanteOutro.trim() !== ""
    : form.solicitante !== "";
  const cpfObrigatorio = isCorreios && form.cpfCnpj.trim() === "";
  const podeEnviar = solicitanteValido
    && form.material.trim() !== ""
    && form.tipoEnvio !== ""
    && form.nomeCliente.trim() !== ""
    && form.endereco.trim() !== ""
    && form.telefone.trim() !== ""
    && !cpfObrigatorio;

  const buscarCEP = async () => {
    const cep = form.cep.replace(/\D/g, "");
    if (cep.length !== 8) return;
    try {
      const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
      const data = await res.json();
      if (!data.erro) {
        setForm((f) => ({
          ...f,
          endereco: `${data.logradouro}, ${data.bairro}, ${data.localidade} - ${data.uf}`,
        }));
      }
    } catch (e) {}
  };

  const enviar = async () => {
    if (!podeEnviar) return;
    setStatus("sending");
    const payload = {
      ...form,
      solicitante: form.solicitante === "Outro" ? form.solicitanteOutro : form.solicitante,
    };
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
        mode: "no-cors",
      });
      setStatus("success");
    } catch (err) {
      setStatus("error");
    }
  };

  const reiniciar = () => { setForm(EMPTY); setStatus("idle"); };

  // ── TELA DE SUCESSO ──
  if (status === "success") {
    return (
      <div style={styles.page}>
        <div style={{ maxWidth: 680, margin: "60px auto", textAlign: "center", padding: 24 }}>
          <div style={{ fontSize: 52, marginBottom: 16 }}>✓</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#1a1816", marginBottom: 8 }}>
            Solicitação enviada!
          </div>
          <div style={{ fontSize: 13, color: "#6a6560", marginBottom: 32 }}>
            O time de amostras receberá a solicitação e atualizará o status em breve.
          </div>
          <button onClick={reiniciar} style={styles.btnPrimary}>
            Nova solicitação
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={styles.page}>
      {/* Header */}
      <div style={styles.header}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <img

            style={{ height: 40, objectFit: "contain" }}
          />
          <div style={{ textAlign: "right" }}>
            <div style={styles.headerTitle}>Solicitação de Amostras</div>
            <div style={styles.headerSub}>Preencha e envie para o time de amostras</div>
          </div>
        </div>
      </div>

      <div style={styles.content}>

        {/* ── BLOCO 1: SOLICITANTE + URGÊNCIA ── */}
        <div style={styles.grid2}>
          <div style={styles.field}>
            <label style={styles.label}>
              {form.tipoEnvio === "Representantes" ? "Representante *" : "Solicitante *"}
            </label>
            <select value={form.solicitante} onChange={set("solicitante")} style={styles.input}>
              <option value="">Selecione...</option>
              {(form.tipoEnvio === "Representantes" ? REPRESENTANTES : SOLICITANTES).map((s) => (
                <option key={s}>{s}</option>
              ))}
            </select>
            {form.solicitante === "Outro" && (
              <input
                value={form.solicitanteOutro}
                onChange={set("solicitanteOutro")}
                placeholder="Digite o nome..."
                style={{ ...styles.input, marginTop: 6 }}
                autoFocus
              />
            )}
          </div>

          <div style={styles.field}>
            <label style={styles.label}>Tipo de envio *</label>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {[
                { value: "Motoboy", label: "🛵 Motoboy" },
                { value: "Correios", label: "📦 Correios" },
                { value: "Representantes", label: "🤝 Representantes" },
              ].map((tipo) => (
                <button
                  key={tipo.value}
                  onClick={() => setForm((f) => ({ ...f, tipoEnvio: tipo.value, solicitante: '', solicitanteOutro: '' }))}
                  style={{
                    ...styles.tipoBtn,
                    background: form.tipoEnvio === tipo.value ? "#fff5f5" : "#f8f7f5",
                    border: `2px solid ${form.tipoEnvio === tipo.value ? "#c53030" : "#e0ddd8"}`,
                    color: form.tipoEnvio === tipo.value ? "#c53030" : "#6a6560",
                    fontWeight: form.tipoEnvio === tipo.value ? 700 : 400,
                  }}
                >
                  {tipo.label}
                </button>
              ))}
            </div>
            {isCorreios && (
              <div style={styles.correiosHint}>
                Fora de SP e Grande SP — CPF/CNPJ obrigatório
              </div>
            )}
            {form.tipoEnvio === "Representantes" && (
              <div style={{ ...styles.correiosHint, color: "#5a5550", background: "#f8f7f5", borderColor: "#d8d5d0" }}>
                Pedido vai para a aba Pedidos Representantes - Especiais
              </div>
            )}
          </div>
        </div>

        {/* ── URGÊNCIA ── */}
        <div style={styles.field}>
          <label style={styles.label}>Prioridade</label>
          <div style={styles.urgRow}>
            {URGENCIAS.map((u) => (
              <button
                key={u.value}
                onClick={() => setForm((f) => ({ ...f, urgencia: u.value }))}
                style={{
                  ...styles.urgBtn,
                  background: form.urgencia === u.value ? u.bg : "#f8f7f5",
                  border: `2px solid ${form.urgencia === u.value ? u.color : "#e0ddd8"}`,
                  color: form.urgencia === u.value ? u.color : "#6a6560",
                  fontWeight: form.urgencia === u.value ? 700 : 400,
                }}
              >
                {u.label}
              </button>
            ))}
          </div>
        </div>

        {/* ── MATERIAL ── */}
        <div style={styles.field}>
          <label style={styles.label}>Material / Amostras solicitadas *</label>
          <textarea
            value={form.material}
            onChange={set("material")}
            placeholder={"Ex:\n- Kit completo Arkowood E + EP\n- 3 réguas K 50x30mm teka - 30cm\n- Caixa KP com todas as cores"}
            style={{ ...styles.input, height: 110, resize: "vertical" }}
          />
        </div>

        {/* ── DADOS DO CLIENTE ── */}
        <div style={styles.sectionLabel}>Dados do cliente</div>

        <div style={styles.grid2}>
          <div style={styles.field}>
            <label style={styles.label}>Nome / A/C *</label>
            <input value={form.nomeCliente} onChange={set("nomeCliente")} style={styles.input} placeholder="Nome do contato" />
          </div>
          <div style={styles.field}>
            <label style={styles.label}>Empresa</label>
            <input value={form.empresa} onChange={set("empresa")} style={styles.input} placeholder="Nome do escritório ou empresa" />
          </div>
        </div>

        <div style={styles.grid2}>
          {/* CPF/CNPJ — obrigatório se Correios */}
          <div style={styles.field}>
            <label style={{
              ...styles.label,
              color: isCorreios ? "#c53030" : "#5a5550",
            }}>
              CPF / CNPJ {isCorreios ? "*" : ""}
            </label>
            <input
              value={form.cpfCnpj}
              onChange={set("cpfCnpj")}
              style={{
                ...styles.input,
                borderColor: cpfObrigatorio ? "#c53030" : "#d8d5d0",
                background: isCorreios ? "#fffafa" : "#ffffff",
              }}
              placeholder={isCorreios ? "Obrigatório para Correios" : "Opcional"}
            />
            {isCorreios && (
              <div style={{ fontSize: 10, color: "#c53030", marginTop: 2 }}>
                Em caso de Correios, obrigatório o preenchimento
              </div>
            )}
          </div>

          <div style={styles.field}>
            <label style={styles.label}>CEP</label>
            <div style={{ display: "flex", gap: 8 }}>
              <input
                value={form.cep}
                onChange={set("cep")}
                onBlur={buscarCEP}
                style={{ ...styles.input, flex: 1 }}
                placeholder="00000-000"
                maxLength={9}
              />
              <button onClick={buscarCEP} style={styles.btnSecondary}>
                Buscar
              </button>
            </div>
          </div>
        </div>

        <div style={styles.field}>
          <label style={styles.label}>Endereço completo *</label>
          <input value={form.endereco} onChange={set("endereco")} style={styles.input} placeholder="Rua, número, complemento, bairro, cidade - UF" />
        </div>

        <div style={styles.grid2}>
          <div style={styles.field}>
            <label style={styles.label}>Email</label>
            <input value={form.email} onChange={set("email")} style={styles.input} placeholder="email@cliente.com" type="email" />
          </div>
          <div style={styles.field}>
            <label style={styles.label}>Telefone / WhatsApp *</label>
            <input value={form.telefone} onChange={set("telefone")} style={styles.input} placeholder="(11) 99999-9999" />
          </div>
        </div>

        {/* ── OBSERVAÇÃO ── */}
        <div style={styles.field}>
          <label style={styles.label}>Observação</label>
          <textarea
            value={form.observacao}
            onChange={set("observacao")}
            placeholder="Informações adicionais, retirada no galpão, data específica, etc."
            style={{ ...styles.input, height: 72, resize: "vertical" }}
          />
        </div>

        {/* Feedback de validação */}
        {!podeEnviar && (form.solicitante || form.material || form.tipoEnvio) && (
          <div style={{ fontSize: 11, color: "#aaa" }}>
            {!solicitanteValido && "• Informe o solicitante. "}
            {!form.tipoEnvio && "• Selecione o tipo de envio. "}
            {!form.material.trim() && "• Informe o material. "}
            {!form.nomeCliente.trim() && "• Informe o nome do cliente. "}
            {!form.endereco.trim() && "• Informe o endereço. "}
            {!form.telefone.trim() && "• Informe o telefone. "}
            {cpfObrigatorio && "• CPF/CNPJ obrigatório para Correios."}
          </div>
        )}

        {status === "error" && (
          <div style={{ background: "#fff5f5", border: "1px solid #fcc", borderRadius: 4, padding: "10px 14px", fontSize: 12, color: "#c53030" }}>
            Erro ao enviar. Verifique sua conexão e tente novamente.
          </div>
        )}

        {/* Botão enviar */}
        <button
          onClick={enviar}
          disabled={status === "sending" || !podeEnviar}
          style={{
            ...styles.btnPrimary,
            width: "100%",
            marginTop: 8,
            opacity: !podeEnviar ? 0.4 : 1,
            cursor: !podeEnviar ? "not-allowed" : "pointer",
          }}
        >
          {status === "sending" ? "Enviando..." : "Enviar solicitação →"}
        </button>

      </div>
    </div>
  );
}
